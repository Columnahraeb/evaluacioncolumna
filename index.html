   ============================================================ */
const SF12_ITEMS = [
  { key: "q1", text: "En general, ¿diría usted que su salud es...?", type: "general",
    options: ["Excelente", "Muy buena", "Buena", "Regular", "Mala"] },

];

const LIMIT3_OPTS = ["Sí, me limita mucho", "Sí, me limita un poco", "No, no me limita nada"];
const YN_OPTS = ["Sí", "No"];
const PAIN5_OPTS = ["Nada", "Un poco", "Regular", "Bastante", "Mucho"];
const FREQ6_OPTS = ["Siempre", "Casi siempre", "Muchas veces", "Algunas veces", "Sólo alguna vez", "Nunca"];
const FREQ6B_OPTS = ["Siempre", "Casi siempre", "Algunas veces", "Sólo alguna vez", "Nunca"];

function getOptionsForType(type) {
  switch (type) {
    case "limit3": return LIMIT3_OPTS;
    case "yn": return YN_OPTS;
    case "pain5": return PAIN5_OPTS;
    case "freq6": return FREQ6_OPTS;
    case "freq6b": return FREQ6B_OPTS;
    default: return [];
  }
}

/* Unified step list: every ODI section + every SF-12 item, in order */
const ALL_STEPS = [
  ...ODI_SECTIONS.map((s) => ({ scale: "ODI", ...s })),
  ...SF12_ITEMS.map((i) => ({ scale: "SF12", ...i })),
];
const TOTAL_STEPS = ALL_STEPS.length; // 10 + 12 = 22

/* ============================================================
   SCORING
   ============================================================ */
function calcODI(answers) {
  const sum = ODI_SECTIONS.reduce((acc, s) => acc + answers[s.key], 0);
  const maxPossible = ODI_SECTIONS.length * 5;
  const pct = Math.round((sum / maxPossible) * 1000) / 10;
  return { pct, sum, maxPossible };
}

function odiInterpretation(pct) {
  if (pct <= 20) return { label: "Discapacidad mínima", color: C.good, detail: "El paciente puede realizar la mayoría de las actividades de la vida diaria." };
  if (pct <= 40) return { label: "Discapacidad moderada", color: C.amber, detail: "Más dolor y dificultad al sentarse, levantar peso y estar de pie; viajes y vida social afectados." };
  if (pct <= 60) return { label: "Discapacidad severa", color: C.wine, detail: "El dolor es el problema principal; se afectan higiene, vida sexual y social." };
  if (pct <= 80) return { label: "Discapacidad muy severa", color: C.wine, detail: "El dolor afecta todos los aspectos de la vida del paciente." };
  return { label: "Postrado / score atípico", color: C.navyDeep, detail: "Sugiere postración en cama o respuestas atípicas; valorar clínicamente." };
}

function calcSF12(a) {
  // NOTA: las ponderaciones de esta función son una aproximación clínica razonable,
  // NO el algoritmo oficial con licencia de QualityMetric/Optum (que es propietario).
  // Útil para seguimiento clínico en consulta; no usar para publicación sin validar
  // contra el algoritmo con licencia oficial.
  const gh = [100, 84, 61, 25, 0][a.q1]; // q1 ["Excelente".."Mala"]: aproximación no lineal del ítem de salud general (GH1)
  const pf1 = [0, 50, 100][a.q2a];
  const pf2 = [0, 50, 100][a.q2b];
  const rp1 = [0, 100][a.q3a]; // YN_OPTS: 0="Sí" (hubo problema, peor) -> 0; 1="No" (sin problema, mejor) -> 100
  const rp2 = [0, 100][a.q3b];
  const re1 = [0, 100][a.q4a];
  const re2 = [0, 100][a.q4b];
  const bp = [100, 75, 50, 25, 0][a.q5];
  const mh1 = [100, 80, 60, 40, 20, 0][a.q6a];
  const vt = [100, 80, 60, 40, 20, 0][a.q6b];
  const mh2 = [0, 20, 40, 60, 80, 100][a.q6c];
  const sf = [0, 25, 50, 75, 100][a.q7]; // FREQ6B_OPTS: 0="Siempre" (limitado, peor) -> 0; 4="Nunca" (mejor) -> 100

  const physicalRaw = [pf1, pf2, rp1, rp2, bp, gh].reduce((x, y) => x + y, 0) / 6;
  const mentalRaw = [mh1, vt, mh2, re1, re2, sf].reduce((x, y) => x + y, 0) / 6;

  const PCS = Math.round((physicalRaw - 50) * 0.5 + 50);
  const MCS = Math.round((mentalRaw - 50) * 0.5 + 50);

  return { PCS, MCS, physicalRaw: Math.round(physicalRaw), mentalRaw: Math.round(mentalRaw) };
}

/* ============================================================
   CSV EXPORT — single combined row
   ============================================================ */
function buildJSONPayload({ patient, momentoLabel, odiAnswers, sf12Answers }) {
  const odi = calcODI(odiAnswers);
  const sf12 = calcSF12(sf12Answers);

  return {
    nombre_paciente: patient.nombre,
    edad: patient.edad,
    fecha_evaluacion: patient.fecha,
    momento: momentoLabel,
    ODI_porcentaje: odi.pct,
    SF12_PCS: sf12.PCS,
    SF12_MCS: sf12.MCS,
  };
}

async function sendToSheet(payload) {
  if (!SHEET_WEBHOOK_URL || SHEET_WEBHOOK_URL === "PEGA_AQUI_TU_URL_DE_APPS_SCRIPT") {
    throw new Error("URL del Apps Script no configurada");
  }
  // Apps Script Web Apps no responden bien a preflight CORS con application/json;
  // usamos text/plain para evitar el preflight y Apps Script igual parsea el JSON.
  const res = await fetch(SHEET_WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error("Respuesta no OK del servidor: " + res.status);
  return res.json().catch(() => ({}));
}

function buildCSVRow({ patient, momentoLabel, odiAnswers, sf12Answers }) {
  const odi = calcODI(odiAnswers);
  const sf12 = calcSF12(sf12Answers);

  const headers = ["nombre_paciente", "edad", "fecha_evaluacion", "momento", "ODI_porcentaje", "SF12_PCS", "SF12_MCS"];

  const row = [patient.nombre, patient.edad, patient.fecha, momentoLabel, odi.pct, sf12.PCS, sf12.MCS];

  const escape = (v) => {
    const s = String(v);
    const needsQuotes = s.indexOf(",") !== -1 || s.indexOf(String.fromCharCode(34)) !== -1 || s.indexOf("\n") !== -1;
    if (!needsQuotes) return s;
    const q = String.fromCharCode(34);
    const doubled = s.split(q).join(q + q);
    return q + doubled + q;
  };

  return { headers, row, csv: headers.map(escape).join(",") + "\n" + row.map(escape).join(",") };
}

function downloadCSV(content, filename) {
  const blob = new Blob(["\uFEFF" + content], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ============================================================
   PATIENT INTAKE
   ============================================================ */
function PatientIntake({ onSubmit }) {
  const [nombre, setNombre] = useState("");
  const [edad, setEdad] = useState("");
  const [fecha, setFecha] = useState(() => new Date().toISOString().slice(0, 10));
  const [momento, setMomento] = useState(null);
  const [touched, setTouched] = useState(false);

  const edadValida = edad !== "" && /^\d+$/.test(edad) && Number(edad) > 0 && Number(edad) < 120;
  const canSubmit = nombre.trim().length > 1 && edadValida && momento && fecha;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
      <div>
        <label style={labelStyle}>Nombre completo del paciente *</label>
        <input value={nombre} onChange={(e) => setNombre(e.target.value)} placeholder="Escriba su nombre" style={inputStyle} />
      </div>

      <div>
        <label style={labelStyle}>Edad (años) *</label>
        <input
          type="number"
          inputMode="numeric"
          min="0"
          max="119"
          value={edad}
          onChange={(e) => setEdad(e.target.value.replace(/[^\d]/g, "").slice(0, 3))}
          placeholder="Ej. 45"
          style={inputStyle}
        />
      </div>

      <div>
        <label style={labelStyle}>Fecha de llenado *</label>
        <input type="date" value={fecha} onChange={(e) => setFecha(e.target.value)} style={inputStyle} />
      </div>

      <div>
        <label style={labelStyle}>Momento de la evaluación *</label>
        <p style={{ fontSize: 13, color: C.inkSoft, margin: "2px 0 10px", lineHeight: 1.5 }}>
          Selecciona la etapa de tu evolución en la que te encuentras respecto a tu cirugía de columna.
        </p>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {MOMENTOS.map((m) => {
            const isSel = momento === m.key;
            return (
              <button key={m.key} onClick={() => setMomento(m.key)} style={{
                padding: "12px 10px", borderRadius: 10,
                border: isSel ? `1.5px solid ${C.navy}` : `1.5px solid ${C.line}`,
                background: isSel ? C.navy : C.white, color: isSel ? "white" : C.ink,
                fontSize: 13.5, fontWeight: 600, cursor: "pointer", textAlign: "center", lineHeight: 1.3,
              }}>
                {m.label}
              </button>
            );
          })}
        </div>
      </div>

      {touched && !canSubmit && (
        <div style={{ fontSize: 12.5, color: C.wine, fontWeight: 600 }}>
          Completa nombre, edad, fecha y momento de evaluación para continuar.
        </div>
      )}

      <button
        onClick={() => { setTouched(true); if (canSubmit) onSubmit({ nombre: nombre.trim(), edad: Number(edad), fecha, momento }); }}
        style={{
          padding: "14px 18px", borderRadius: 12, border: "none", marginTop: 4,
          background: canSubmit ? C.navy : C.inkFaint, color: "white",
          fontSize: 16, fontWeight: 700, cursor: "pointer",
          boxShadow: canSubmit ? `0 4px 14px ${C.navy}40` : "none",
        }}
      >
        Comenzar evaluación
      </button>
    </div>
  );
}

const labelStyle = { display: "block", fontSize: 13, fontWeight: 700, color: C.navy, marginBottom: 6, letterSpacing: 0.2 };
const inputStyle = {
  width: "100%", padding: "13px 14px", borderRadius: 10, border: `1.5px solid ${C.line}`,
  fontSize: 16, color: C.ink, background: C.white, boxSizing: "border-box", fontFamily: "inherit",

/* ============================================================
   UNIFIED QUESTIONNAIRE (ODI then SF-12, single step list)
   ============================================================ */
function Questionnaire({ onFinish }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [warning, setWarning] = useState(false);

  const current = ALL_STEPS[step];
  const isODI = current.scale === "ODI";
  const accent = isODI ? C.navy : C.wine;
  const opts = isODI ? current.options : (current.type === "general" ? current.options : getOptionsForType(current.type));
  const selected = answers[current.key];
  const isLast = step === TOTAL_STEPS - 1;

  // Detect transition point between scales (first SF-12 item)
  const isFirstSF12 = !isODI && step === ODI_SECTIONS.length;

  const select = (idx) => {
    setAnswers((p) => ({ ...p, [current.key]: idx }));
    setWarning(false);
  };

  const goNext = () => {
    if (selected === undefined) {
      setWarning(true);
      return;
    }
    setWarning(false);
    if (isLast) {
      onFinish(answers);
    } else {
      setStep((s) => s + 1);
      if (typeof window !== "undefined") window.scrollTo({ top: 0, behavior: "smooth" });
    }
  };

  const goBack = () => {
    setWarning(false);
    setStep((s) => s - 1);
    if (typeof window !== "undefined") window.scrollTo({ top: 0, behavior: "smooth" });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 7, fontSize: 12.5, color: C.inkSoft, fontWeight: 600 }}>
          <span>{isODI ? "ODI" : "SF-12"} · PREGUNTA {step + 1} / {TOTAL_STEPS}</span>
          <span>{Math.round(((step + 1) / TOTAL_STEPS) * 100)}%</span>
        </div>
        <ProgressBar value={step + 1} max={TOTAL_STEPS} color={accent} />
      </div>

      {isFirstSF12 && (
        <div style={{ background: `${C.wine}10`, border: `1px dashed ${C.wine}55`, borderRadius: 10, padding: "10px 12px", fontSize: 13, color: C.wine, fontWeight: 600, textAlign: "center" }}>
          Sección ODI completada. Ahora continúa con el cuestionario SF-12.
        </div>
      )}

      <div>
        {isODI && <h2 style={{ fontSize: 20, fontWeight: 800, color: accent, margin: 0 }}>{current.title}</h2>}
        {isODI && current.subtitle && <p style={{ fontSize: 13.5, color: C.inkSoft, margin: "3px 0 0" }}>{current.subtitle}</p>}
        {!isODI && current.group && <p style={{ fontSize: 13.5, color: C.inkSoft, margin: "0 0 8px", lineHeight: 1.5, fontStyle: "italic" }}>{current.group}</p>}
        {!isODI && <h2 style={{ fontSize: 18.5, fontWeight: 800, color: accent, margin: 0, lineHeight: 1.35 }}>{current.text}</h2>}
      </div>

      <OptionList options={opts} selected={selected} onSelect={select} accent={accent} />

      <NavButtons
        showBack={step > 0}
        onBack={goBack}
        onNext={goNext}
        nextLabel={isLast ? "Finalizar y ver resultados" : "Siguiente"}
        disabled={selected === undefined}
        accent={accent}
        warning={warning}
      />
    </div>
  );
}

/* ============================================================
   RESULTS (combined)
   ============================================================ */
function BigScore({ value, suffix, label, color }) {
  return (
    <div style={{ background: `linear-gradient(135deg, ${color}, ${color}DD)`, color: "white", borderRadius: 16, padding: "24px 18px", textAlign: "center" }}>
      <div style={{ fontSize: 40, fontWeight: 800, lineHeight: 1 }}>{value}{suffix}</div>
      <div style={{ fontSize: 12.5, opacity: 0.88, marginTop: 6, fontWeight: 600 }}>{label}</div>
    </div>
  );
}

function PatientHeader({ patient, momentoLabel }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: C.sand, borderRadius: 10, fontSize: 13 }}>
      <div>
        <div style={{ fontWeight: 700, color: C.ink }}>{patient.nombre} · {patient.edad} años</div>
        <div style={{ color: C.inkFaint, fontSize: 11.5 }}>{patient.fecha}</div>
      </div>
      <div style={{ background: C.navy, color: "white", padding: "4px 10px", borderRadius: 20, fontSize: 11.5, fontWeight: 700 }}>
        {momentoLabel}
      </div>
    </div>
  );
}

function CombinedResult({ patient, odiAnswers, sf12Answers, onRestart }) {
  const [copied, setCopied] = useState(false);
  const [sheetStatus, setSheetStatus] = useState("sending"); // sending | sent | failed
  const odi = calcODI(odiAnswers);
  const sf12 = calcSF12(sf12Answers);
  const interp = odiInterpretation(odi.pct);
  const momentoLabel = MOMENTOS.find((m) => m.key === patient.momento)?.label || patient.momento;

  React.useEffect(() => {
    const payload = buildJSONPayload({ patient, momentoLabel, odiAnswers, sf12Answers });
    sendToSheet(payload)
      .then(() => setSheetStatus("sent"))
      .catch(() => setSheetStatus("failed"));
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const retrySend = () => {
    setSheetStatus("sending");
    const payload = buildJSONPayload({ patient, momentoLabel, odiAnswers, sf12Answers });
    sendToSheet(payload)
      .then(() => setSheetStatus("sent"))
      .catch(() => setSheetStatus("failed"));
  };

  const handleExport = () => {
    const { csv } = buildCSVRow({ patient, momentoLabel, odiAnswers, sf12Answers });
    downloadCSV(csv, `Evaluacion_${patient.nombre.replace(/\s+/g, "_")}_${momentoLabel.replace(/\s+/g, "_")}_${patient.fecha}.csv`);
  };
  const handleCopy = async () => {
    const { headers, row } = buildCSVRow({ patient, momentoLabel, odiAnswers, sf12Answers });
    const text = headers.join("\t") + "\n" + row.join("\t");
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
      } else {
        throw new Error("Clipboard API no disponible");
      }
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    } catch (err) {
      // Fallback: select a hidden textarea and copy via execCommand
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        setCopied(true);
        setTimeout(() => setCopied(false), 1800);
      } catch (err2) {
        alert("No se pudo copiar automáticamente. Usa el botón de descargar CSV.");
      }
    }
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <PatientHeader patient={patient} momentoLabel={momentoLabel} />

      {sheetStatus === "sending" && (
        <div style={{ background: `${C.amber}15`, border: `1px solid ${C.amber}55`, borderRadius: 10, padding: "10px 12px", fontSize: 13, color: C.amber, fontWeight: 600, textAlign: "center" }}>
          Enviando datos a la base de datos…
        </div>
      )}
      {sheetStatus === "sent" && (
        <div style={{ background: `${C.good}15`, border: `1px solid ${C.good}55`, borderRadius: 10, padding: "10px 12px", fontSize: 13, color: C.good, fontWeight: 600, textAlign: "center" }}>
          ✓ Datos guardados correctamente en la base de datos
        </div>
      )}
      {sheetStatus === "failed" && (
        <div style={{ background: `${C.wine}15`, border: `1px solid ${C.wine}55`, borderRadius: 10, padding: "10px 12px", fontSize: 13, color: C.wine, fontWeight: 600, textAlign: "center" }}>
          No se pudo guardar automáticamente (revisa tu conexión a internet). Usa "Descargar CSV" o "Copiar datos" como respaldo, o intenta de nuevo.
          <div style={{ marginTop: 8 }}>
            <button type="button" onClick={retrySend} style={{ padding: "8px 14px", borderRadius: 8, border: "none", background: C.wine, color: "white", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
              Reintentar envío
            </button>
          </div>
        </div>
      )}

      <h2 style={{ fontSize: 18, fontWeight: 800, color: C.navy, margin: 0 }}>Resultados de la evaluación</h2>

      <div>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.inkFaint, marginBottom: 8, letterSpacing: 0.5 }}>ODI — DISCAPACIDAD</div>
        <BigScore value={odi.pct} suffix="%" label="Índice de discapacidad de Oswestry" color={C.navy} />
        <div style={{ background: C.sand, borderRadius: 12, padding: 14, borderLeft: `4px solid ${interp.color}`, marginTop: 10 }}>
          <div style={{ fontWeight: 800, color: interp.color, marginBottom: 4, fontSize: 15 }}>{interp.label}</div>
          <div style={{ fontSize: 13.5, color: C.inkSoft, lineHeight: 1.5 }}>{interp.detail}</div>
        </div>
        <div style={{ fontSize: 11.5, color: C.inkFaint, marginTop: 6 }}>{odi.sum} / {odi.maxPossible} puntos</div>
      </div>

      <div>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.inkFaint, marginBottom: 8, letterSpacing: 0.5 }}>SF-12 — CALIDAD DE VIDA</div>
        <div style={{ display: "flex", gap: 10 }}>
          <div style={{ flex: 1 }}><BigScore value={sf12.PCS} suffix="" label="Componente físico" color={C.wine} /></div>
          <div style={{ flex: 1 }}><BigScore value={sf12.MCS} suffix="" label="Componente mental" color={C.amber} /></div>
        </div>
        <div style={{ background: C.sand, borderRadius: 12, padding: 14, fontSize: 13, color: C.inkSoft, lineHeight: 1.5, marginTop: 10 }}>
          Escala normalizada (media poblacional = 50, DE 10). Valores por debajo de 50 indican peor estado que la población general; por encima, mejor estado.
        </div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 4 }}>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={handleExport} style={{ flex: 1, padding: "13px 14px", borderRadius: 10, border: "none", background: C.navyDeep, color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
            ⬇ Descargar CSV
          </button>
          <button onClick={handleCopy} style={{ flex: 1, padding: "13px 14px", borderRadius: 10, border: `1.5px solid ${C.line}`, background: "white", color: C.ink, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
            {copied ? "✓ Copiado" : "Copiar datos"}
          </button>
        </div>
        <div style={{ fontSize: 11.5, color: C.inkFaint, textAlign: "center" }}>
          El archivo CSV/copia incluye datos del paciente, momento y los 3 resultados finales (ODI%, PCS, MCS) — mismo formato que tu base de datos.
        </div>
        <button onClick={onRestart} style={{ padding: "12px 18px", borderRadius: 10, border: `1.5px solid ${C.line}`, background: "white", color: C.inkSoft, fontSize: 14.5, fontWeight: 700, cursor: "pointer" }}>
          Nueva evaluación
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   MAIN APP
   ============================================================ */
function EscalasApp() {
  const [view, setView] = useState("intake"); // intake | questionnaire | result
  const [patient, setPatient] = useState(null);
  const [finalAnswers, setFinalAnswers] = useState(null);
  const [qKey, setQKey] = useState(0);

  const odiAnswers = finalAnswers
    ? Object.fromEntries(ODI_SECTIONS.map((s) => [s.key, finalAnswers[s.key]]))
    : null;
  const sf12Answers = finalAnswers
    ? Object.fromEntries(SF12_ITEMS.map((i) => [i.key, finalAnswers[i.key]]))
    : null;

  return (
    <div style={{ minHeight: "100vh", background: C.sand, fontFamily: "-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif", display: "flex", justifyContent: "center", padding: "28px 16px" }}>
      <div style={{ width: "100%", maxWidth: 460 }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 11.5, letterSpacing: 2, color: C.amber, fontWeight: 800, textTransform: "uppercase" }}>
            Evaluación clínica · Columna
          </div>
          <div style={{ fontSize: 25, fontWeight: 800, color: C.navy, marginTop: 3, letterSpacing: -0.3 }}>
            ODI · SF-12
          </div>
        </div>

        <div style={{ background: "white", borderRadius: 20, padding: 24, boxShadow: "0 8px 30px rgba(19,41,75,0.10)", border: `1px solid ${C.line}` }}>

          {view === "intake" && (
            <>
              <h2 style={{ fontSize: 17, fontWeight: 800, color: C.navy, margin: "0 0 6px" }}>Datos de la evaluación</h2>
              <p style={{ fontSize: 13, color: C.inkSoft, margin: "0 0 16px", lineHeight: 1.5 }}>
                A continuación llenarás dos cuestionarios (ODI y SF-12). Todas las preguntas son obligatorias.
              </p>
              <PatientIntake onSubmit={(p) => { setPatient(p); setView("questionnaire"); }} />
            </>
          )}

          {view === "questionnaire" && (
            <Questionnaire key={qKey} onFinish={(answers) => { setFinalAnswers(answers); setView("result"); }} />
          )}

          {view === "result" && patient && odiAnswers && sf12Answers && (
            <CombinedResult
              patient={patient}
              odiAnswers={odiAnswers}
              sf12Answers={sf12Answers}
              onRestart={() => { setFinalAnswers(null); setPatient(null); setQKey((k) => k + 1); setView("intake"); }}
            />
          )}
        </div>

        <div style={{ textAlign: "center", marginTop: 18, fontSize: 11, color: C.inkFaint }}>
          Herramienta de apoyo clínico · No sustituye juicio médico
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<EscalasApp />);
</script>
</body>
</html>
